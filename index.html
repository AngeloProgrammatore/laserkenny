<script type="text/babel">
const { useState, useEffect, useRef } = window.React;
const ReactDOM_Client = window.ReactDOM;
// IndexedDB Setup with Dexie
const db = new window.Dexie('laserkenny-db');
db.version(1).stores({
projects: '++id, createdAt'
});
// Color mappings
const difficultyColors = {
'facile': 'difficulty-facile',
'medio': 'difficulty-medio',
'avanzato': 'difficulty-avanzato'
};
const materialColors = {
'Compensato': 'material-wood',
'MDF': 'material-mdf',
'Acrilico': 'material-acrylic',
'Cartone': 'material-cardboard'
};
// Categories data
const categories = [
{ id: 'portaoggetti', name: 'Porta-oggetti', emoji: '📦' },
{ id: 'organizer', name: 'Organizer', emoji: '🗂️' },
{ id: 'decorazioni', name: 'Decorazioni', emoji: '✨' },
{ id: 'giochi', name: 'Giochi', emoji: '🎮' },
{ id: 'scatole', name: 'Scatole', emoji: '📫' },
{ id: 'supporti', name: 'Supporti Tech', emoji: '💻' },
{ id: 'portacandele', name: 'Portacandele', emoji: '🕯️' },
{ id: 'puzzle', name: 'Puzzle 3D', emoji: '🧩' },
{ id: 'modellini', name: 'Modellini', emoji: '🏗️' },
{ id: 'segnalibri', name: 'Segnalibri', emoji: '📖' },
{ id: 'targhette', name: 'Targhette', emoji: '🏷️' },
{ id: 'portachiavi', name: 'Portachiavi', emoji: '🔑' },
{ id: 'complementi', name: "Complementi d'arredo", emoji: '🛋️' }
];
// API Functions
const generateIdeas = async (prompt, apiKey) => {
if (!apiKey) throw new Error('API key not configured');
const systemPrompt = `You are a creative laser cutter design assistant. Generate exactly 5 innovative and interesting laser cutter project ideas based on the user's request. Return a JSON array with this exact structure (no markdown, just pure JSON):
[
{
"name": "Project Name",
"description": "Detailed description of the project",
"difficulty": "facile|medio|avanzato",
"material": "Compensato|MDF|Acrilico|Cartone",
"estimated_time": "Time in minutes"
}
]
All text must be in Italian. Be creative and practical.`;
const response = await fetch('https://api.anthropic.com/v1/messages', {
method: 'POST',
headers: {
'Content-Type': 'application/json',
'x-api-key': apiKey,
'anthropic-version': '2023-06-01',
'anthropic-dangerous-direct-browser-access': 'true'
},
body: JSON.stringify({
model: 'claude-sonnet-4-20250514',
max_tokens: 1024,
system: systemPrompt,
messages: [
{ role: 'user', content: prompt }
]
})
});
if (!response.ok) {
if (response.status === 401) throw new Error('Chiave API non valida');
if (response.status === 429) throw new Error('Limite di tasso superato. Riprova più tardi');
throw new Error('Errore API: ' + response.status);
}
const data = await response.json();
const content = data.content[0].text;
// Extract JSON from response
const jsonMatch = content.match(/\[[\s\S]*\]/);
if (!jsonMatch) throw new Error('Formato risposta non valido');
return JSON.parse(jsonMatch[0]);
};
const generateInstructions = async (ideaName, config, apiKey) => {
if (!apiKey) throw new Error('API key not configured');
const systemPrompt = `You are an expert laser cutter project designer. Generate detailed, step-by-step instructions for a laser cutter project. Return a JSON object with this exact structure (no markdown, just pure JSON):
{
"overview": "A 2-3 paragraph overview of the project",
"parts_list": [
{ "pezzo": "Part Name", "quantita": "Quantity", "dimensioni": "Size/Dimensions", "note": "Notes" }
],
"cutting_schema": "Detailed description of the cutting pattern and layout",
"assembly_steps": [
{ "title": "Step Title", "description": "Detailed step description", "tips": "Helpful tips for this step" }
],
"laser_notes": "Technical notes for laser cutting (power, speed, focus, etc.)",
"customization_tips": "Ideas for customizing or improving the project"
}
All text must be in Italian. Be practical and detailed.`;
const prompt = `Project: ${ideaName}\nMaterial: ${config.material}\nThickness: ${config.thickness}mm\nSize: ${config.size}\nDimensions: ${config.width || 'N/A'} x ${config.height || 'N/A'} x ${config.depth || 'N/A'} cm`;
const response = await fetch('https://api.anthropic.com/v1/messages', {
method: 'POST',
headers: {
'Content-Type': 'application/json',
'x-api-key': apiKey,
'anthropic-version': '2023-06-01',
'anthropic-dangerous-direct-browser-access': 'true'
},
body: JSON.stringify({
model: 'claude-sonnet-4-20250514',
max_tokens: 2048,
system: systemPrompt,
messages: [
{ role: 'user', content: prompt }
]
})
});
if (!response.ok) {
if (response.status === 401) throw new Error('Chiave API non valida');
if (response.status === 429) throw new Error('Limite di tasso superato');
throw new Error('Errore API: ' + response.status);
}
const data = await response.json();
const content = data.content[0].text;
const jsonMatch = content.match(/\{[\s\S]*\}/);
if (!jsonMatch) throw new Error('Formato risposta non valido');
return JSON.parse(jsonMatch[0]);
};
// PDF Export
const exportPDF = (projectName, config, instructions) => {
const { jsPDF } = window.jspdf;
const doc = new jsPDF({
orientation: 'portrait',
unit: 'mm',
format: 'a4'
});
const pageWidth = doc.internal.pageSize.getWidth();
const pageHeight = doc.internal.pageSize.getHeight();
const margin = 15;
const contentWidth = pageWidth - (2 * margin);
// Cover page
doc.setFillColor(30, 58, 95);
doc.rect(0, 0, pageWidth, pageHeight, 'F');
doc.setFont('helvetica', 'bold');
doc.setFontSize(48);
doc.setTextColor(255, 255, 255);
doc.text('LaserKenny', pageWidth / 2, pageHeight / 3, { align: 'center' });
doc.setFontSize(28);
doc.text(projectName, pageWidth / 2, pageHeight / 2, { align: 'center' });
doc.setFontSize(12);
doc.setFont('helvetica', 'normal');
const coverInfo = [
`Materiale: ${config.material}`,
`Spessore: ${config.thickness}mm`,
`Dimensioni: ${config.size}`,
`Data: ${new Date().toLocaleDateString('it-IT')}`
];
let yPos = pageHeight / 2 + 40;
coverInfo.forEach(line => {
doc.text(line, pageWidth / 2, yPos, { align: 'center' });
yPos += 12;
});
// Table of Contents
doc.addPage();
doc.setTextColor(0, 0, 0);
doc.setFontSize(24);
doc.setFont('helvetica', 'bold');
doc.text('Indice', margin, margin + 20);
doc.setFontSize(12);
doc.setFont('helvetica', 'normal');
const toc = [
'1. Panoramica',
'2. Lista dei Pezzi',
'3. Schema di Taglio',
'4. Passi di Assemblaggio',
'5. Note Laser',
'6. Personalizzazione'
];
yPos = margin + 40;
toc.forEach(item => {
doc.text(item, margin, yPos);
yPos += 10;
});
// Overview page
doc.addPage();
doc.setFillColor(30, 58, 95);
doc.rect(0, 0, pageWidth, 40, 'F');
doc.setTextColor(255, 255, 255);
doc.setFontSize(20);
doc.setFont('helvetica', 'bold');
doc.text('Panoramica', margin, 27);
doc.setTextColor(0, 0, 0);
doc.setFontSize(11);
doc.setFont('helvetica', 'normal');
const overviewText = doc.splitTextToSize(instructions.overview, contentWidth);
doc.text(overviewText, margin, 60);
// Parts list page
doc.addPage();
doc.setFillColor(30, 58, 95);
doc.rect(0, 0, pageWidth, 40, 'F');
doc.setTextColor(255, 255, 255);
doc.setFontSize(20);
doc.setFont('helvetica', 'bold');
doc.text('Lista dei Pezzi', margin, 27);
const partsData = instructions.parts_list.map(p => [
p.pezzo,
p.quantita,
p.dimensioni,
p.note
]);
doc.autoTable({
head: [['Pezzo', 'Quantità', 'Dimensioni', 'Note']],
body: partsData,
startY: 50,
margin: { left: margin, right: margin },
styles: { fontSize: 10, cellPadding: 5 },
headStyles: { fillColor: [30, 58, 95], textColor: 255 }
});
// Cutting schema page
doc.addPage();
doc.setFillColor(30, 58, 95);
doc.rect(0, 0, pageWidth, 40, 'F');
doc.setTextColor(255, 255, 255);
doc.setFontSize(20);
doc.setFont('helvetica', 'bold');
doc.text('Schema di Taglio', margin, 27);
doc.setTextColor(0, 0, 0);
doc.setFontSize(11);
doc.setFont('helvetica', 'normal');
const cuttingText = doc.splitTextToSize(instructions.cutting_schema, contentWidth);
doc.text(cuttingText, margin, 60);
// Assembly steps page(s)
doc.addPage();
doc.setFillColor(30, 58, 95);
doc.rect(0, 0, pageWidth, 40, 'F');
doc.setTextColor(255, 255, 255);
doc.setFontSize(20);
doc.setFont('helvetica', 'bold');
doc.text('Passi di Assemblaggio', margin, 27);
doc.setTextColor(0, 0, 0);
doc.setFontSize(12);
doc.setFont('helvetica', 'bold');
yPos = 60;
instructions.assembly_steps.forEach((step, idx) => {
if (yPos > pageHeight - 40) {
doc.addPage();
yPos = margin;
}
doc.setFillColor(245, 158, 11);
doc.circle(margin + 8, yPos + 5, 5, 'F');
doc.setTextColor(255, 255, 255);
doc.setFontSize(10);
doc.text((idx + 1).toString(), margin + 8, yPos + 7, { align: 'center' });
doc.setTextColor(0, 0, 0);
doc.setFontSize(12);
doc.setFont('helvetica', 'bold');
doc.text(step.title, margin + 20, yPos + 2);
doc.setFont('helvetica', 'normal');
doc.setFontSize(10);
const descText = doc.splitTextToSize(step.description, contentWidth - 20);
yPos += 12;
doc.text(descText, margin + 5, yPos);
yPos += descText.length * 6 + 5;
if (step.tips) {
doc.setFont('helvetica', 'italic');
const tipsText = doc.splitTextToSize('Suggerimento: ' + step.tips, contentWidth - 10);
doc.text(tipsText, margin + 5, yPos);
yPos += tipsText.length * 5 + 10;
}
yPos += 8;
});
// Laser notes page
doc.addPage();
doc.setFillColor(30, 58, 95);
doc.rect(0, 0, pageWidth, 40, 'F');
doc.setTextColor(255, 255, 255);
doc.setFontSize(20);
doc.setFont('helvetica', 'bold');
doc.text('Note Laser', margin, 27);
doc.setTextColor(0, 0, 0);
doc.setFontSize(10);
doc.setFont('courier', 'normal');
const laserText = doc.splitTextToSize(instructions.laser_notes, contentWidth);
doc.text(laserText, margin, 60);
// Customization page
doc.addPage();
doc.setFillColor(30, 58, 95);
doc.rect(0, 0, pageWidth, 40, 'F');
doc.setTextColor(255, 255, 255);
doc.setFontSize(20);
doc.setFont('helvetica', 'bold');
doc.text('Personalizzazione', margin, 27);
doc.setTextColor(0, 0, 0);
doc.setFontSize(11);
doc.setFont('helvetica', 'normal');
const customText = doc.splitTextToSize(instructions.customization_tips, contentWidth);
doc.text(customText, margin, 60);
// Add page numbers
const pageCount = doc.getNumberOfPages();
for (let i = 1; i <= pageCount; i++) {
doc.setPage(i);
doc.setFontSize(10);
doc.setTextColor(128, 128, 128);
doc.text(
`Pagina ${i} di ${pageCount}`,
pageWidth / 2,
pageHeight - 10,
{ align: 'center' }
);
}
doc.save(`${projectName}.pdf`);
};
// Home Page Component
const HomePage = ({ onSelectCategory, onSelectIdea, onSurprise }) => {
const [loading, setLoading] = useState(false);
const [ideas, setIdeas] = useState([]);
const [searchTerm, setSearchTerm] = useState('');
const handleSearch = async () => {
if (!searchTerm.trim()) return;
setLoading(true);
try {
const apiKey = localStorage.getItem('laserkenny_api_key');
const results = await generateIdeas(`${searchTerm}`, apiKey);
setIdeas(results);
} catch (err) {
alert('Errore: ' + err.message);
} finally {
setLoading(false);
}
};
return (
<div className="pb-20">
{/* Hero Section */}
<div className="gradient-header text-white p-6 sm:p-8">
<h1 className="text-3xl sm:text-4xl font-bold text-center mb-6">
Cosa vuoi costruire?
</h1>
{/* Search Bar */}
<div className="flex gap-2 mb-6">
<input
type="text"
placeholder="Descrivi il tuo progetto..."
value={searchTerm}
onChange={(e) => setSearchTerm(e.target.value)}
onKeyPress={(e) => e.key === 'Enter' && handleSearch()}
className="flex-1 px-4 py-2 rounded-lg text-gray-800"
/>
<button
onClick={handleSearch}
disabled={loading}
className="bg-accent text-primary px-6 py-2 rounded-lg font-semibold hover:bg-yellow-500 disabled:opacity-50"
>
{loading ? '...' : 'Cerca'}
</button>
</div>
{/* Surprise Button */}
<div className="text-center">
<button
onClick={onSurprise}
className="bg-white text-primary px-6 py-2 rounded-lg font-semibold hover:bg-gray-100"
>
Sorprendimi ✨
</button>
</div>
</div>
{/* Ideas Display */}
{ideas.length > 0 && (
<div className="p-4 sm:p-6">
<h2 className="text-2xl font-bold mb-4 text-primary">Idee Trovate</h2>
<div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
{ideas.map((idea, idx) => (
<div
key={idx}
onClick={() => onSelectIdea(idea)}
className="card-shadow cursor-pointer p-4 rounded-lg bg-white hover:shadow-lg"
>
<h3 className="text-lg font-bold text-primary mb-2">{idea.name}</h3>
<p className="text-gray-600 text-sm mb-3">{idea.description}</p>
<div className="flex flex-wrap gap-2">
<span className={`difficulty-badge ${difficultyColors[idea.difficulty]}`}>
{idea.difficulty}
</span>
<span className="text-xs bg-gray-200 text-gray-800 px-2 py-1 rounded">
{idea.material}
</span>
<span className="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded">
{idea.estimated_time} min
</span>
</div>
</div>
))}
</div>
</div>
)}
{/* Categories Grid */}
<div className="p-4 sm:p-6">
<h2 className="text-2xl font-bold mb-4 text-primary">Categorie</h2>
<div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-4">
{categories.map((cat) => (
<button
key={cat.id}
onClick={() => onSelectCategory(cat.name)}
className="category-grid-item p-4 rounded-lg bg-white card-shadow text-center hover:bg-gray-50"
>
<div className="text-4xl mb-2">{cat.emoji}</div>
<div className="text-xs sm:text-sm font-semibold text-primary">{cat.name}</div>
</button>
))}
</div>
</div>
</div>
);
};
// Configuration Page Component
const ConfigurationPage = ({ idea, onGenerateInstructions, onBack }) => {
const [config, setConfig] = useState({
material: 'Compensato',
thickness: '3',
size: 'Medio',
width: '',
height: '',
depth: ''
});
const [loading, setLoading] = useState(false);
const handleGenerateInstructions = async () => {
setLoading(true);
try {
const apiKey = localStorage.getItem('laserkenny_api_key');
const instructions = await generateInstructions(idea.name, config, apiKey);
onGenerateInstructions(instructions, config);
} catch (err) {
alert('Errore: ' + err.message);
} finally {
setLoading(false);
}
};
return (
<div className="pb-20">
{/* Header */}
<div className="gradient-header text-white p-6 sm:p-8">
<button
onClick={onBack}
className="mb-4 text-lg hover:opacity-80"
>
← Indietro
</button>
<h1 className="text-3xl sm:text-4xl font-bold mb-2">{idea.name}</h1>
<p className="text-gray-100">{idea.description}</p>
</div>
{/* Configuration Form */}
<div className="max-w-2xl mx-auto p-4 sm:p-6">
{/* Material Selector */}
<div className="mb-8">
<h2 className="text-xl font-bold text-primary mb-4">Materiale</h2>
<div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
{['Compensato', 'MDF', 'Acrilico', 'Cartone'].map((mat) => (
<button
key={mat}
onClick={() => setConfig({ ...config, material: mat })}
className={`p-3 rounded-lg font-semibold transition ${
config.material === mat
? 'bg-primary text-white'
: 'bg-gray-200 text-gray-800 hover:bg-gray-300'
}`}
>
{mat}
</button>
))}
</div>
</div>
{/* Thickness Selector */}
<div className="mb-8">
<h2 className="text-xl font-bold text-primary mb-4">Spessore</h2>
<div className="grid grid-cols-4 gap-3">
{['3', '4', '5', '6'].map((thick) => (
<button
key={thick}
onClick={() => setConfig({ ...config, thickness: thick })}
className={`p-3 rounded-lg font-semibold transition ${
config.thickness === thick
? 'bg-primary text-white'
: 'bg-gray-200 text-gray-800 hover:bg-gray-300'
}`}
>
{thick}mm
</button>
))}
</div>
</div>
{/* Size Selector */}
<div className="mb-8">
<h2 className="text-xl font-bold text-primary mb-4">Dimensioni</h2>
<div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
{['Piccolo', 'Medio', 'Grande', 'Personalizzato'].map((size) => (
<button
key={size}
onClick={() => setConfig({ ...config, size })}
className={`p-3 rounded-lg font-semibold transition ${
config.size === size
? 'bg-primary text-white'
: 'bg-gray-200 text-gray-800 hover:bg-gray-300'
}`}
>
{size}
</button>
))}
</div>
</div>
{/* Custom Dimensions */}
{config.size === 'Personalizzato' && (
<div className="mb-8 p-4 bg-gray-100 rounded-lg">
<h3 className="font-semibold text-primary mb-3">Dimensioni Personalizzate (cm)</h3>
<div className="grid grid-cols-3 gap-3">
<div>
<label className="block text-sm font-semibold mb-1">Larghezza</label>
<input
type="number"
value={config.width}
onChange={(e) => setConfig({ ...config, width: e.target.value })}

// My Projects Page Component
const MyProjectsPage = ({ onViewProject }) => {
const [projects, setProjects] = useState([]);
const [loading, setLoading] = useState(true);
useEffect(() => {
const loadProjects = async () => {
try {
const allProjects = await db.projects.orderBy('createdAt').reverse().toArray();
setProjects(allProjects);
} catch (err) {
console.error('Error loading projects:', err);
} finally {
setLoading(false);
}
};
loadProjects();
}, []);
const handleDelete = async (id) => {
if (!window.confirm('Sei sicuro di voler eliminare questo progetto?')) return;
try {
await db.projects.delete(id);
setProjects(projects.filter(p => p.id !== id));
} catch (err) {
alert('Errore nel cancellamento: ' + err.message);
}
};
return (
<div className="pb-20">
{/* Header */}
<div className="gradient-header text-white p-6 sm:p-8">
<h1 className="text-3xl sm:text-4xl font-bold">I Miei Progetti</h1>
<p className="text-gray-100 mt-2">{projects.length} progetto{projects.length !== 1 ? 'i' : ''}</p>
</div>
{/* Projects List */}
<div className="max-w-4xl mx-auto p-4 sm:p-6">
{loading ? (
<div className="text-center py-12">
<p className="text-gray-500">Caricamento...</p>
</div>
) : projects.length === 0 ? (
<div className="text-center py-12">
<p className="text-gray-500 mb-4">Nessun progetto salvato</p>
<p className="text-gray-400">Crea il tuo primo progetto dalla home!</p>
</div>
) : (
<div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
{projects.map((project) => (
<div
key={project.id}
className="card-shadow rounded-lg bg-white overflow-hidden hover:shadow-lg"
>
<div
onClick={() => onViewProject(project)}
className="p-4 cursor-pointer"
>
<h3 className="text-lg font-bold text-primary mb-2">{project.name}</h3>
<div className="flex flex-wrap gap-2 mb-3">
<span className={`difficulty-badge ${difficultyColors[project.difficulty]}`}>
{project.difficulty}
</span>
<span className={`material-badge ${materialColors[project.material]}`}>
{project.material}
</span>
</div>
<p className="text-xs text-gray-500">
Spessore: {project.thickness}mm • {project.size}
</p>
<p className="text-xs text-gray-400 mt-2">{project.date}</p>
</div>
<button
onClick={() => handleDelete(project.id)}
className="w-full bg-red-50 text-red-600 py-2 font-semibold hover:bg-red-100 border-t"
>
Elimina
</button>
</div>
))}
</div>
)}
</div>
</div>
);
};
// Settings Page Component
const SettingsPage = () => {
const [apiKey, setApiKey] = useState('');
const [showKey, setShowKey] = useState(false);
const [savedKey, setSavedKey] = useState('');
useEffect(() => {
const key = localStorage.getItem('laserkenny_api_key');
if (key) {
setSavedKey(key.slice(0, 10) + '...');
setApiKey(key);
}
}, []);
const handleSaveKey = () => {
if (!apiKey.trim()) {
alert('Inserisci una chiave API valida');
return;
}
localStorage.setItem('laserkenny_api_key', apiKey);
setSavedKey(apiKey.slice(0, 10) + '...');
alert('Chiave API salvata');
};
const handleClearKey = () => {
if (!window.confirm('Sei sicuro di voler eliminare la chiave API?')) return;
localStorage.removeItem('laserkenny_api_key');
setApiKey('');
setSavedKey('');
alert('Chiave API eliminata');
};
const handleClearAllProjects = async () => {
if (!window.confirm('ATTENZIONE: Questo eliminerà TUTTI i progetti salvati. Continuare?')) return;
try {
await db.projects.clear();
alert('Tutti i progetti sono stati eliminati');
} catch (err) {
alert('Errore: ' + err.message);
}
};
return (
<div className="pb-20">
{/* Header */}
<div className="gradient-header text-white p-6 sm:p-8">
<h1 className="text-3xl sm:text-4xl font-bold">Impostazioni</h1>
</div>
{/* Settings Content */}
<div className="max-w-2xl mx-auto p-4 sm:p-6">
{/* API Key Section */}
<div className="bg-white rounded-lg p-6 mb-6 card-shadow">
<h2 className="text-2xl font-bold text-primary mb-4">Chiave API Anthropic</h2>
<p className="text-gray-600 mb-4">
Inserisci la tua chiave API di Anthropic per generare idee e istruzioni.
</p>
<div className="mb-4">
<label className="block text-sm font-semibold mb-2">Chiave API</label>
<input
type={showKey ? 'text' : 'password'}
value={apiKey}
onChange={(e) => setApiKey(e.target.value)}
placeholder="sk-ant-..."
className="w-full px-4 py-2 border rounded-lg"
/>
</div>
{savedKey && (
<p className="text-sm text-green-600 mb-4">
✓ Chiave configurata: {savedKey}
</p>
)}
<div className="flex gap-2 flex-wrap">
<button
onClick={() => setShowKey(!showKey)}
className="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg font-semibold hover:bg-gray-300"
>
{showKey ? 'Nascondi' : 'Mostra'}
</button>
<button
onClick={handleSaveKey}
className="px-4 py-2 bg-primary text-white rounded-lg font-semibold hover:bg-blue-900"
>
Salva
</button>
<button
onClick={handleClearKey}
className="px-4 py-2 bg-red-500 text-white rounded-lg font-semibold hover:bg-red-600"
>
Elimina
</button>
</div>
</div>
{/* Language Section */}
<div className="bg-white rounded-lg p-6 mb-6 card-shadow">
<h2 className="text-2xl font-bold text-primary mb-4">Lingua</h2>
<p className="text-gray-600">Lingua attuale: <strong>Italiano</strong></p>
</div>
{/* App Info Section */}
<div className="bg-white rounded-lg p-6 mb-6 card-shadow">
<h2 className="text-2xl font-bold text-primary mb-4">Informazioni App</h2>
<div className="text-gray-600 space-y-2">
<p><strong>App:</strong> LaserKenny</p>
<p><strong>Versione:</strong> 1.0.0</p>
<p><strong>Descrizione:</strong> App PWA per progettare progetti laser cutter</p>
</div>
</div>
{/* Danger Zone */}
<div className="bg-red-50 rounded-lg p-6 border-2 border-red-200">
<h2 className="text-2xl font-bold text-red-600 mb-4">Zona Pericolosa</h2>
<p className="text-gray-600 mb-4">
Queste azioni non possono essere annullate.
</p>
<button
onClick={handleClearAllProjects}
className="px-4 py-2 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700"

</button>
</div>
</div>
</div>
);
};

// Main App Component
const App = () => {
const [currentPage, setCurrentPage] = useState('home');
const [selectedIdea, setSelectedIdea] = useState(null);
const [selectedConfig, setSelectedConfig] = useState(null);
const [instructions, setInstructions] = useState(null);
const [projectName, setProjectName] = useState('');
const handleSelectCategory = async (categoryName) => {
setCurrentPage('ideas');
try {
const apiKey = localStorage.getItem('laserkenny_api_key');
const results = await generateIdeas(`Progetto di ${categoryName}`, apiKey);
// Show ideas on home and let user select
console.log('Ideas:', results);
} catch (err) {
alert('Errore: ' + err.message);
}
};
const handleSelectIdea = (idea) => {
setSelectedIdea(idea);
setProjectName(idea.name);
setCurrentPage('configuration');
};
const handleGenerateInstructions = (instr, config) => {
setInstructions(instr);
setSelectedConfig(config);
setCurrentPage('instructions');
};
const handleSurprise = async () => {
try {
const apiKey = localStorage.getItem('laserkenny_api_key');
const results = await generateIdeas('Sorprendimi con un\'idea creativa e interessante per il laser cutter', apiKey);
handleSelectIdea(results[0]);
} catch (err) {
alert('Errore: ' + err.message);
}
};
const handleNavigate = (page) => {
setCurrentPage(page);
if (page === 'home') {
setSelectedIdea(null);
setSelectedConfig(null);
setInstructions(null);
}
};
return (
<div className="min-h-screen bg-gray-50">
<Navbar currentPage={currentPage} onNavigate={handleNavigate} />
{currentPage === 'home' && (
<HomePage
onSelectCategory={handleSelectCategory}
onSelectIdea={handleSelectIdea}
onSurprise={handleSurprise}
/>
)}
{currentPage === 'configuration' && selectedIdea && (
<ConfigurationPage
idea={selectedIdea}
onGenerateInstructions={handleGenerateInstructions}
onBack={() => handleNavigate('home')}
/>
)}
{currentPage === 'instructions' && instructions && selectedConfig && (
<InstructionsPage
projectName={projectName}
instructions={instructions}
config={selectedConfig}
onSaveProject={() => {}}
onBack={() => handleNavigate('home')}
/>
)}
{currentPage === 'myprojects' && (
<MyProjectsPage
onViewProject={(project) => {
setProjectName(project.name);
setInstructions(project.instructions);
setSelectedConfig(project.config);
setCurrentPage('instructions');
}}
/>
)}
{currentPage === 'settings' && <SettingsPage />}
</div>
);
};
// Render App
const root = ReactDOM_Client.createRoot(document.getElementById('root'));
root.render(<App />);
// Register Service Worker
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js').catch(err => {
console.log('Service Worker registration failed:', err);
});
}
</script>
</body>
</html>
